name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-container-gate:
    name: CI / quality-and-container-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POETRY_VERSION: "2.1.3"
      IMAGE_NAME: nextspyke-ci
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: nextspyke
      PGUSER: nextspyke
      PGPASSWORD: nextspyke
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: python -m pip install "poetry==${POETRY_VERSION}"

      - name: Validate lock metadata
        run: poetry check --lock

      - name: Install locked development dependencies
        run: poetry sync --extras dev --no-interaction

      - name: Ruff lint
        run: poetry run ruff check --no-cache src tests scripts

      - name: Ruff format check
        run: poetry run ruff format --check --no-cache src tests scripts

      - name: Run unit tests with coverage
        run: |
          poetry run coverage run -m unittest discover -s tests
          poetry run coverage report -m --fail-under=100

      - name: Validate Compose configuration
        run: docker compose config -q

      - name: Run database integration tests
        run: |
          export KEEP_DB=true
          poetry run python scripts/run_db_tests.py

      - name: Build candidate image
        run: |
          docker build \
            --build-arg VERSION=ci \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "${IMAGE_NAME}" .

      - name: Smoke test candidate image
        run: |
          docker run --rm --network host \
            -e PGHOST="${PGHOST}" \
            -e PGPORT="${PGPORT}" \
            -e PGDATABASE="${PGDATABASE}" \
            -e PGUSER="${PGUSER}" \
            -e PGPASSWORD="${PGPASSWORD}" \
            "${IMAGE_NAME}" \
            python -c "import psycopg; from datetime import datetime, timezone; from nextspyke.db import build_dsn, init_db; conn = psycopg.connect(build_dsn()); init_db(conn); cur = conn.cursor(); cur.execute('INSERT INTO snapshot (fetched_at, domain, source, raw_json) VALUES (%s, %s, %s, %s)', (datetime.now(timezone.utc), 'fg', 'ci-smoke', None)); conn.commit(); cur.close(); conn.close()"
          docker run --rm --network host \
            -e PGHOST="${PGHOST}" \
            -e PGPORT="${PGPORT}" \
            -e PGDATABASE="${PGDATABASE}" \
            -e PGUSER="${PGUSER}" \
            -e PGPASSWORD="${PGPASSWORD}" \
            "${IMAGE_NAME}" \
            python -m nextspyke.app health

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/compose-logs.txt || true
          docker images --digests > artifacts/docker-images.txt || true

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-failure-artifacts
          path: artifacts

      - name: Tear down Compose services
        if: always()
        run: docker compose down -v
